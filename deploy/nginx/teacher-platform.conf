# Replace teacher.example.edu and certificate paths before enabling.

server {
    listen 80;
    server_name teacher.example.edu;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name teacher.example.edu;

    ssl_certificate /etc/letsencrypt/live/teacher.example.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teacher.example.edu/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /opt/teacher-platform/admin/dist;
    index index.html;

    access_log /var/log/nginx/teacher-platform.access.log;
    error_log /var/log/nginx/teacher-platform.error.log warn;

    client_max_body_size 20m;

    location /api/v1/ {
        proxy_pass http://127.0.0.1:8090/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8090/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8090/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
